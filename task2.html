    <h1>Task 2</h1>
    <p> Assignment 2: Even or Odd Checker (Modulo)
Problem
Check whether a number is even or odd.
Requirements
Use % operator 
Return string: "Even" or "Odd" .</p>

    <script>
        function checkevenodd(num){
            if(num % 2 === 0){
                return "Even";
            }else{
                return "Odd";
            }

        }
        console.log(checkevenodd(2));
     
    </script>
