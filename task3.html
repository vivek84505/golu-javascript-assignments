    <p>Assignment 3: Login Access System (Logical Operators)
Problem
User can login if:
username === "admin" AND password === "1234" 
OR
role === "superadmin" 
Requirements
Use && and ||
    <script>
      function loginaccess(username, password, role){
        if(username === "admin" && password === "admin1234" && role === "superadmin"){
          return "Access granted";
        }else{
          return "Access denied";
        }
      }
      console.log(loginaccess("admin1", "admin123", "superadmin"));
    </script>
